{% set version = "2.1.0" %}
{% set checksum = "902a8caa07db88d27707de74a1c13c2bf27711a6898de5dfab29ab72fa7e56f6" %}

package:
  name: z5py
  version: {{ version }}

source:
  url: https://github.com/constantinpape/z5/archive/{{ version }}.tar.gz
  sha256: {{ checksum }}
build:
  number: 0

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - cmake
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - ninja  # [win]
    - make  # [not win]
  host:
    - python
    - numpy
    - xtensor >=0.27,<0.28
    - xtensor-python >=0.29,<0.30
    - xsimd >=13,<14
    - blosc
    - bzip2
    - liblzma-devel
    - zlib
    - nlohmann_json
    - lz4-c
  run:
    - python

test:
  imports:
    - z5py
  requires:
    - zarr
  source_files:
    - src/python/test/*.py
  commands:
    - python -m unittest discover -s src/python/test -v

about:
  home: https://github.com/constantinpape/z5
  license: MIT
  license_file: LICENSE
  summary: Lightweight C++ and Python interface for datasets in zarr and N5 format.

extra:
  recipe-maintainers:
    - constantinpape
    - SylvainCorlay
