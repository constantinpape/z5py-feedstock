{% set version = "3.0.0" %}
{% set checksum = "493164cbf2a1b51f15f8cd3d2dbc8f10147f491845af9137c5547cc4d11bb359" %}

package:
  name: z5py
  version: {{ version }}

source:
  url: https://github.com/constantinpape/z5/archive/{{ version }}.tar.gz
  sha256: {{ checksum }}
build:
  number: 0

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - cmake
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - ninja  # [win]
    - make  # [not win]
  host:
    - python >=3.11
    - numpy
    - nanobind
    - blosc
    - bzip2
    - liblzma-devel
    - zlib
    - libdeflate
    - zstd
    - nlohmann_json
    - lz4-c
  run:
    - python >=3.11
    - numpy

test:
  imports:
    - z5py
  requires:
    - zarr >=3
    - tensorstore  # [not win]
  source_files:
    - src/python/test/*.py
  commands:
    - python -m unittest discover -s src/python/test -v

about:
  home: https://github.com/constantinpape/z5
  license: MIT
  license_file: LICENSE
  summary: Lightweight C++ and Python interface for datasets in zarr and N5 format.

extra:
  recipe-maintainers:
    - constantinpape
    - SylvainCorlay
